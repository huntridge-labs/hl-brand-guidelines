<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huntridge Labs Email Signature</title>
</head>
<body style="margin:0;padding:0;background:#ffffff;">

<!--
  ================================================
  HUNTRIDGE LABS — EMAIL SIGNATURE TEMPLATE
  ================================================
  HOW TO CUSTOMIZE:
  1. Replace [FULL NAME] with the employee's name
  2. Replace [JOB TITLE] with their title
  3. Replace [PHONE NUMBER] with their direct number
  4. Replace [LINKEDIN_URL] with their LinkedIn profile URL
  5. Replace [GITHUB_URL] with their GitHub profile URL

  HOW TO USE IN GMAIL:
  1. Open this file in your browser
  2. Select all (Ctrl+A / Cmd+A) and copy (Ctrl+C / Cmd+C)
  3. Go to Gmail → Settings → See all settings → General → Signature
  4. Create a new signature and paste (Ctrl+V / Cmd+V)
  ================================================
-->

<table
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica Neue, Arial, sans-serif;
    font-size: 14px;
    color: #1e1e1e;
    max-width: 480px;
    width: 100%;
  "
>
  <tr>
    <td style="padding-bottom: 14px;">

      <!-- Name -->
      <p style="margin:0 0 2px 0; font-size:16px; font-weight:600; color:#1e1e1e; line-height:1.3;">
        [FULL NAME]
      </p>

      <!-- Title -->
      <p style="margin:0 0 10px 0; font-size:13px; font-weight:400; color:#595959; letter-spacing:0.02em; text-transform:uppercase;">
        [JOB TITLE]
      </p>

      <!-- Contact -->
      <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:10px;">
        <tr>
          <!-- Phone -->
          <td style="font-size:13px; color:#737373; padding-right:14px; white-space:nowrap;">
            <a href="tel:[PHONE NUMBER]" style="color:#737373; text-decoration:none;">[PHONE NUMBER]</a>
          </td>
          <!-- Website -->
          <td style="font-size:13px; color:#38889B; white-space:nowrap;">
            <a href="https://www.huntridgelabs.com/" style="color:#38889B; text-decoration:none;">huntridgelabs.com</a>
          </td>
        </tr>
      </table>

    </td>
  </tr>

  <tr>
    <td style="padding-top: 14px; border-top: 2px solid #FDF039;">

      <!-- Logo -->
      <img
        src="https://huntridge-labs.github.io/hl-brand-guidelines/Logo files/HL_Primary_Horizontal_FullColor_OnLight.png"
        alt="Huntridge Labs"
        width="180"
        style="display:block; height:auto;"
      />

    </td>
  </tr>
</table>

</body>
</html>
